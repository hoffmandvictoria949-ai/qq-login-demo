<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>QQ 登录</title>
  <style>
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      width: 380px;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #1da1f2;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1da1f2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      background: #0d8bd8;
    }
    .links {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
    .links a {
      color: #1da1f2;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="logo">QQ 账号登录</div>

  <input placeholder="QQ 号 / 手机号 / 邮箱" />
  <input type="password" placeholder="密码" />

  <button>登录</button>

  <div class="links">
    <a href="#">无法登录？</a>
    &nbsp;|&nbsp;
    <a href="#">注册账号</a>
  </div>
</div>
</body>
</html>
